<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🏰 Xây Lâu Đài - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- SETUP SCREEN -->
    <section id="setup-screen" class="screen active">
      <div class="setup-container">
        <h1 class="setup-title">🏰 Xây Lâu Đài</h1>
        <p class="setup-subtitle">Trả lời đúng để xây cao!</p>

        <div class="setup-section">
          <label class="setup-label">🎮 Chế độ</label>
          <div class="btn-group" id="mode-group">
            <button class="btn-option active" data-mode="solo">Solo</button>
            <button class="btn-option" data-mode="coop">Hợp tác</button>
            <button class="btn-option" data-mode="versus">Đối đầu</button>
          </div>
        </div>

        <div class="setup-section">
          <label class="setup-label">🏰 Kiểu lâu đài</label>
          <div class="theme-grid" id="theme-grid"></div>
        </div>

        <div class="setup-section">
          <label class="setup-label">📚 Môn học</label>
          <div class="btn-group" id="subject-group">
            <button class="btn-option active" data-subject="math">Toán</button>
            <button class="btn-option" data-subject="vietnamese">Tiếng Việt</button>
            <button class="btn-option" data-subject="mix">Trộn</button>
          </div>
        </div>

        <div class="setup-section">
          <label class="setup-label">📊 Mức độ</label>
          <div class="btn-group" id="difficulty-group">
            <button class="btn-option active" data-difficulty="easy">Dễ</button>
            <button class="btn-option" data-difficulty="medium">Trung bình</button>
            <button class="btn-option" data-difficulty="hard">Khó</button>
          </div>
        </div>

        <button class="btn-start" id="btn-start">🚀 Bắt đầu xây!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <div class="game-layout">
        <div class="game-header">
          <button class="btn-exit" id="btn-exit">✕</button>
          <div class="game-info" id="game-info"></div>
        </div>
        <div class="castle-area" id="castle-area">
          <div class="castle-tower" id="castle-tower"></div>
        </div>
        <div class="question-area">
          <div class="timer-wrap"><div class="timer-bar" id="timer-bar"></div></div>
          <div class="q-text" id="q-text"></div>
          <div class="answer-grid" id="answer-grid">
            <button class="ans-btn" data-opt="a">A</button>
            <button class="ans-btn" data-opt="b">B</button>
            <button class="ans-btn" data-opt="c">C</button>
            <button class="ans-btn" data-opt="d">D</button>
          </div>
          <div class="status-text" id="status-text"></div>
        </div>
      </div>
      <!-- Exit confirm -->
      <div class="exit-overlay" id="exit-overlay">
        <div class="exit-card">
          <p>🚪 Bạn muốn thoát?</p>
          <div class="exit-btns">
            <button class="exit-btn cancel" id="exit-cancel">Tiếp tục</button>
            <button class="exit-btn confirm" id="exit-confirm">Thoát</button>
          </div>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container" id="result-container"></div>
    </section>
  </div>
  <script src="game.js"></script>
</body>
</html>
