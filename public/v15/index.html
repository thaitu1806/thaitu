<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🦁 Vườn Thú Kỳ Diệu - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- ZOO SCREEN (main hub) -->
    <section id="zoo-screen" class="screen active">
      <div class="zoo-header">
        <a href="/" class="zoo-home">🏠</a>
        <div class="zoo-title">🦁 Vườn Thú Kỳ Diệu</div>
        <div class="zoo-coins">💰 <span id="coin-display">0</span></div>
      </div>
      <div class="zoo-grid" id="zoo-grid"></div>
      <div class="zoo-actions">
        <button class="zoo-btn play" id="btn-play">📝 Kiếm Xu</button>
        <button class="zoo-btn shop" id="btn-shop">🛒 Mua Thú</button>
        <button class="zoo-btn rewards" id="btn-rewards">🎁 Phần Thưởng</button>
      </div>
      <div class="zoo-info" id="zoo-info">Tap ô trống để xây chuồng!</div>
    </section>

    <!-- REWARDS SCREEN -->
    <section id="rewards-screen" class="screen">
      <div class="rewards-container">
        <div class="rewards-header">
          <button class="shop-back" id="btn-rewards-back">← Quay lại</button>
          <div class="rewards-title">🎁 Phần Thưởng Thật</div>
        </div>
        <p class="rewards-desc">Sưu tập thú để nhận quà từ ba mẹ!</p>
        <div class="rewards-list" id="rewards-list"></div>
        <div class="rewards-note">💡 Khi đạt mốc, cho ba mẹ xem để nhận quà nhé!</div>
      </div>
    </section>

    <!-- SHOP SCREEN -->
    <section id="shop-screen" class="screen">
      <div class="shop-header">
        <button class="shop-back" id="btn-shop-back">← Quay lại</button>
        <div class="shop-title">🛒 Cửa Hàng</div>
        <div class="shop-coins">💰 <span id="shop-coin-display">0</span></div>
      </div>
      <div class="shop-tabs" id="shop-tabs">
        <button class="shop-tab active" data-tier="all">Tất cả</button>
        <button class="shop-tab" data-tier="common">🟢</button>
        <button class="shop-tab" data-tier="rare">🔵</button>
        <button class="shop-tab" data-tier="epic">🟣</button>
        <button class="shop-tab" data-tier="legend">🟡</button>
      </div>
      <div class="shop-list" id="shop-list"></div>
    </section>

    <!-- QUIZ SCREEN -->
    <section id="quiz-screen" class="screen">
      <div class="quiz-hud">
        <div class="quiz-progress" id="quiz-progress">1/10</div>
        <div class="quiz-combo" id="quiz-combo"></div>
        <div class="quiz-earned">💰 <span id="quiz-earned">0</span></div>
      </div>
      <div class="quiz-timer-bar"><div class="quiz-timer-fill" id="quiz-timer-fill"></div></div>
      <div class="quiz-body">
        <div class="quiz-question" id="quiz-question"></div>
        <div class="quiz-answers" id="quiz-answers">
          <button class="qa-btn" data-opt="a"></button>
          <button class="qa-btn" data-opt="b"></button>
          <button class="qa-btn" data-opt="c"></button>
          <button class="qa-btn" data-opt="d"></button>
        </div>
        <div class="quiz-status" id="quiz-status"></div>
      </div>
    </section>

    <!-- QUIZ RESULT -->
    <section id="quiz-result-screen" class="screen">
      <div class="qr-container" id="qr-container"></div>
    </section>
  </div>
  <link rel="stylesheet" href="/tts.css">
  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
