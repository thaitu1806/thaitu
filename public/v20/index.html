<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🌾 Nông Trại Vui Vẻ - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- FARM SCREEN (Main Hub) -->
    <section id="farm-screen" class="screen active">
      <div class="farm-container">
        <div class="farm-header">
          <h1 class="farm-title">🌾 Nông Trại Vui Vẻ</h1>
          <div class="coin-display">
            <span class="coin-icon">💰</span>
            <span class="coin-amount" id="coin-amount">50</span> xu
          </div>
        </div>
        <div class="farm-stats">
          <span id="harvest-count">🌿 Thu hoạch: 0</span>
          <span id="daily-bonus-status"></span>
        </div>
        <div class="farm-grid" id="farm-grid"></div>
        <div class="farm-actions">
          <button class="btn-water" id="btn-water">💧 Tưới nước (Quiz)</button>
          <button class="btn-shop" id="btn-shop">🏪 Cửa hàng</button>
        </div>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- PLANT SCREEN (Choose seed) -->
    <section id="plant-screen" class="screen">
      <div class="plant-container">
        <h2 class="plant-title">🌱 Chọn hạt giống</h2>
        <p class="plant-subtitle">Trồng vào ô đất đã chọn</p>
        <div class="seed-list" id="seed-list"></div>
        <button class="btn-back" id="btn-back-farm">🔙 Quay lại</button>
      </div>
    </section>

    <!-- SHOP SCREEN -->
    <section id="shop-screen" class="screen">
      <div class="shop-container">
        <h2 class="shop-title">🏪 Cửa Hàng</h2>
        <div class="shop-coins">
          <span class="coin-icon">💰</span>
          <span id="shop-coin-amount">50</span> xu
        </div>
        <div class="shop-section">
          <h3>🌱 Mua thêm ô đất</h3>
          <div id="plot-shop"></div>
        </div>
        <button class="btn-back" id="btn-back-shop">🔙 Quay lại</button>
      </div>
    </section>

    <!-- QUIZ SCREEN -->
    <section id="quiz-screen" class="screen">
      <div class="quiz-container">
        <div class="quiz-header">
          <div class="quiz-progress">
            <span id="quiz-progress-text">Câu 1/10</span>
            <div class="quiz-progress-bar">
              <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
            </div>
          </div>
          <div class="quiz-correct-count">💧 <span id="quiz-correct">0</span>/10</div>
        </div>
        <div class="quiz-question-box">
          <p class="quiz-question" id="quiz-question"></p>
        </div>
        <div class="quiz-answers" id="quiz-answers">
          <button class="ans-btn" data-opt="a"></button>
          <button class="ans-btn" data-opt="b"></button>
          <button class="ans-btn" data-opt="c"></button>
          <button class="ans-btn" data-opt="d"></button>
        </div>
      </div>
    </section>

    <!-- QUIZ RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container">
        <div class="result-icon">💧</div>
        <h2 class="result-title" id="result-title">Kết quả tưới nước!</h2>
        <p class="result-detail" id="result-detail"></p>
        <div class="result-watered" id="result-watered"></div>
        <button class="btn-start" id="btn-back-result">🌾 Về nông trại</button>
      </div>
    </section>
  </div>
  <link rel="stylesheet" href="/tts.css">
  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
