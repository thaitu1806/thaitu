<!DOCTYPE html>
<html lang="vi">
<head>
  <script src="api-config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>📚 Góc Học Tập - Toán Lớp 2</title>
  <link rel="stylesheet" href="learn.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- MENU -->
    <div id="menu-screen" class="screen active">
      <div class="learn-header">
        <a href="/" class="back-link">← Về trang chủ</a>
        <h1>📚 Góc Học Tập</h1>
        <p id="learn-subtitle">Toán lớp 2 - Học qua hình ảnh!</p>
      </div>
      <div class="grade-tabs" id="grade-tabs">
        <button class="grade-tab active" data-grade="2" onclick="switchGrade(2)">Lớp 2</button>
        <button class="grade-tab" data-grade="3" onclick="switchGrade(3)">Lớp 3</button>
        <button class="grade-tab" data-grade="4" onclick="switchGrade(4)">Lớp 4</button>
        <button class="grade-tab" data-grade="5" onclick="switchGrade(5)">Lớp 5</button>
      </div>
      <div class="topics-grid" id="topics-grid">
        <!-- Filled by JS based on grade -->
      </div>
    </div>

    <!-- LESSON SCREEN -->
    <div id="lesson-screen" class="screen">
      <div class="lesson-header">
        <button class="btn-back-menu" onclick="showScreen('menu-screen')">← Quay lại</button>
        <span id="lesson-title" class="lesson-title"></span>
        <span id="lesson-page" class="lesson-page">1/5</span>
      </div>
      <div class="lesson-body" id="lesson-body">
        <!-- Dynamic content -->
      </div>
      <div class="lesson-nav">
        <button id="btn-lesson-prev" class="ln-btn" onclick="prevSlide()">← Trước</button>
        <div class="lesson-dots" id="lesson-dots"></div>
        <button id="btn-lesson-next" class="ln-btn" onclick="nextSlide()">Tiếp →</button>
      </div>
    </div>

    <!-- CLOCK INTERACTIVE -->
    <div id="clock-play-screen" class="screen">
      <div class="lesson-header">
        <button class="btn-back-menu" onclick="showScreen('menu-screen')">← Quay lại</button>
        <span class="lesson-title">👆 Kéo Kim Đồng Hồ</span>
        <span></span>
      </div>
      <div class="clock-play-body">
        <div class="clock-challenge" id="clock-challenge">
          <div class="challenge-text" id="challenge-text">Hãy chỉnh đồng hồ về: <strong id="target-time">3 giờ 00 phút</strong></div>
          <div class="challenge-result" id="challenge-result"></div>
        </div>
        <div class="clock-interactive-wrap">
          <svg id="interactive-clock" width="280" height="280" viewBox="0 0 280 280"></svg>
          <div class="clock-display" id="clock-time-display">12:00</div>
        </div>
        <div class="clock-play-controls">
          <button class="cp-btn" id="btn-check-time">✅ Kiểm tra</button>
          <button class="cp-btn cp-btn-next" id="btn-new-challenge">🎲 Câu mới</button>
        </div>
        <div class="clock-play-score">
          <span>✅ Đúng: <strong id="cp-correct">0</strong></span>
          <span>❌ Sai: <strong id="cp-wrong">0</strong></span>
        </div>
      </div>
    </div>
  </div>
  <!-- AI Tutor Chatbot -->
  <button id="ai-tutor-btn" class="ai-feature ai-tutor-fab" onclick="toggleChatPanel()" style="display:none">
    🤖 Hỏi Thầy AI
  </button>

  <div id="ai-chat-panel" class="ai-chat-panel hidden">
    <div class="ai-chat-header">
      <span>🤖 Thầy AI</span>
      <span id="ai-chat-remaining" class="ai-chat-remaining"></span>
      <button class="ai-chat-close" onclick="toggleChatPanel()">✕</button>
    </div>
    <div class="ai-chat-messages" id="ai-chat-messages">
      <div class="ai-msg bot">Chào con! 👋 Thầy AI đây. Hỏi bài gì thầy giúp nhé! 📚</div>
    </div>
    <div class="ai-chat-input-wrap" id="ai-chat-input-wrap">
      <input type="text" id="ai-chat-input" placeholder="Hỏi bài tại đây..." maxlength="200" onkeydown="if(event.key==='Enter')sendChatMessage()">
      <button id="ai-chat-send" onclick="sendChatMessage()">📤</button>
    </div>
  </div>

  <script src="learn.js"></script>
  <script src="/sounds.js"></script>
</body>
</html>
