<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌻 Học Vui V2 - Phiêu Lưu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="screen active">
      <div class="splash-content">
        <div class="splash-logo">🌻⚔️🧟</div>
        <h1>HỌC VUI PHIÊU LƯU</h1>
        <p class="splash-sub">Bảo vệ vương quốc bằng trí tuệ!</p>
        <div class="splash-input">
          <input type="text" id="player-name" placeholder="Tên chiến binh..." maxlength="15">
          <div class="speed-setting">
            <label>⏱️ Tốc độ:</label>
            <select id="timer-speed">
              <option value="slow">Chậm (nhiều thời gian)</option>
              <option value="normal" selected>Bình thường</option>
              <option value="fast">Nhanh (thử thách)</option>
            </select>
          </div>
          <button id="btn-play" class="btn-play">⚔️ Vào game!</button>
        </div>
      </div>
    </div>

    <!-- WORLD MAP -->
    <div id="map-screen" class="screen">
      <div class="map-header">
        <div class="player-bar">
          <span id="player-display">👤 Tên</span>
          <span id="coins-display">🪙 0</span>
          <span id="stars-total">⭐ 0</span>
        </div>
        <div class="daily-quest-btn" id="btn-daily">🎯 Nhiệm vụ</div>
      </div>
      <div class="world-map" id="world-map">
        <!-- Generated by JS -->
      </div>
      <div class="map-footer">
        <div class="plant-selector" id="plant-selector">
          <!-- Plants unlocked -->
        </div>
      </div>
    </div>

    <!-- BATTLE SCREEN -->
    <div id="battle-screen" class="screen">
      <div class="battle-header">
        <div class="battle-info">
          <span id="level-label">Level 1</span>
          <span id="zone-label">🌱 Vườn Hoa</span>
        </div>
        <div class="battle-stats">
          <span id="hp-display">❤️ 3</span>
          <span id="battle-score">💰 0</span>
          <span id="wave-display">👾 1/5</span>
        </div>
      </div>

      <div class="battle-arena">
        <div class="battlefield">
          <div class="base">🏠</div>
          <div class="field-track">
            <div id="zombies-container"></div>
            <div id="projectiles-container"></div>
          </div>
          <div class="plant-base">
            <div id="active-plant" class="plant">🌻</div>
          </div>
        </div>

        <div class="question-panel">
          <div class="q-header">
            <span id="q-type-badge" class="q-badge">🔢 Toán</span>
            <div id="q-timer" class="q-timer"><div class="q-timer-fill"></div></div>
          </div>
          <div id="q-text" class="q-text"></div>
          <div id="q-options" class="q-options">
            <button class="q-btn" data-opt="a"></button>
            <button class="q-btn" data-opt="b"></button>
            <button class="q-btn" data-opt="c"></button>
            <button class="q-btn" data-opt="d"></button>
          </div>
        </div>
      </div>

      <!-- Power-ups bar -->
      <div class="powerups-bar">
        <button class="powerup" id="pu-eliminate" title="Loại 1 đáp án sai">🚫 <span class="pu-count">2</span></button>
        <button class="powerup" id="pu-freeze" title="Đóng băng zombie 5s">🧊 <span class="pu-count">1</span></button>
        <button class="powerup" id="pu-double" title="x2 điểm câu này">✨ <span class="pu-count">1</span></button>
      </div>
    </div>

    <!-- LEVEL COMPLETE -->
    <div id="complete-screen" class="screen">
      <div class="complete-content">
        <h2 id="complete-title">🎉 Hoàn thành!</h2>
        <div id="complete-stars" class="complete-stars"></div>
        <div class="complete-stats">
          <div class="cs-row"><span>Đúng</span><span id="cs-correct">0/0</span></div>
          <div class="cs-row"><span>Combo max</span><span id="cs-combo">0</span></div>
          <div class="cs-row"><span>Coins</span><span id="cs-coins">+0</span></div>
        </div>
        <div id="complete-unlock" class="complete-unlock hidden"></div>
        <div class="complete-btns">
          <button class="btn-next" id="btn-next-level">▶️ Level tiếp</button>
          <button class="btn-map" id="btn-back-map">🗺️ Bản đồ</button>
        </div>
      </div>
    </div>

    <!-- GAME OVER -->
    <div id="gameover-screen" class="screen">
      <div class="gameover-content">
        <div class="go-zombie">🧟‍♂️</div>
        <h2>Zombie đã vào nhà!</h2>
        <p id="go-message">Cố gắng lần sau nhé!</p>
        <div class="complete-btns">
          <button class="btn-retry" id="btn-retry">🔄 Thử lại</button>
          <button class="btn-map" id="btn-back-map2">🗺️ Bản đồ</button>
        </div>
      </div>
    </div>

    <!-- DAILY QUEST MODAL -->
    <div id="daily-modal" class="modal hidden">
      <div class="modal-box">
        <button class="modal-close" id="close-daily">✕</button>
        <h3>🎯 Nhiệm vụ hôm nay</h3>
        <div id="daily-quests"></div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
