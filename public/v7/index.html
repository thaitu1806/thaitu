<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🧗 Leo Núi Trí Tuệ - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- SETUP SCREEN -->
    <section id="setup-screen" class="screen active">
      <div class="setup-container">
        <h1 class="setup-title">🧗 Leo Núi Trí Tuệ</h1>
        <p class="setup-subtitle">Ai lên đỉnh trước?</p>

        <div class="setup-section">
          <label class="setup-label">👥 Số người chơi</label>
          <div class="btn-group" id="player-count-group">
            <button class="btn-option active" data-count="2">2</button>
            <button class="btn-option" data-count="3">3</button>
            <button class="btn-option" data-count="4">4</button>
          </div>
        </div>

        <div class="setup-section">
          <label class="setup-label">📚 Môn học</label>
          <div class="btn-group" id="subject-group">
            <button class="btn-option active" data-subject="math">Toán</button>
            <button class="btn-option" data-subject="vietnamese">Tiếng Việt</button>
            <button class="btn-option" data-subject="mix">Trộn</button>
          </div>
        </div>

        <div class="setup-section">
          <label class="setup-label">📊 Mức độ</label>
          <div class="btn-group" id="difficulty-group">
            <button class="btn-option active" data-difficulty="easy">Dễ</button>
            <button class="btn-option" data-difficulty="medium">Trung bình</button>
            <button class="btn-option" data-difficulty="hard">Khó</button>
          </div>
        </div>

        <div class="setup-section">
          <label class="setup-label">🏔️ Chiều cao núi: <span id="height-display">15</span> tầng</label>
          <input type="range" id="height-slider" class="height-slider" min="10" max="30" value="15" step="1">
        </div>

        <button class="btn-start" id="btn-start">🚀 Bắt đầu leo!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <div class="game-layout">
        <!-- Header: exit + player positions -->
        <div class="game-header">
          <button class="btn-exit" id="btn-exit">✕</button>
          <div class="player-positions" id="player-positions"></div>
        </div>

        <!-- Mountain board (vertical scroll) -->
        <div class="mountain-wrapper" id="mountain-wrapper">
          <div class="mountain-board" id="mountain-board"></div>
        </div>

        <!-- Bottom: question area -->
        <div class="question-area" id="question-area">
          <div class="turn-badge" id="turn-badge">Lượt: ...</div>
          <div class="timer-bar-wrap"><div class="timer-bar" id="q-timer-bar"></div></div>
          <div class="question-text" id="question-text"></div>
          <div class="answer-buttons" id="answer-buttons">
            <button class="ans-btn" data-opt="a">A</button>
            <button class="ans-btn" data-opt="b">B</button>
            <button class="ans-btn" data-opt="c">C</button>
            <button class="ans-btn" data-opt="d">D</button>
          </div>
          <div class="combo-display" id="combo-display"></div>
        </div>
      </div>

      <!-- Exit confirm -->
      <div class="exit-overlay" id="exit-overlay">
        <div class="exit-card">
          <div class="exit-icon">🚪</div>
          <div class="exit-text">Bạn muốn thoát?</div>
          <div class="exit-btns">
            <button class="exit-btn cancel" id="exit-cancel">Tiếp tục</button>
            <button class="exit-btn confirm" id="exit-confirm">Thoát</button>
          </div>
        </div>
      </div>

      <!-- Weather event overlay -->
      <div class="weather-overlay" id="weather-overlay"></div>
    </section>

    <!-- VICTORY SCREEN -->
    <section id="victory-screen" class="screen">
      <div class="victory-container" id="victory-container"></div>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
