<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🍦 Tiệm Kem - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/tts.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- START SCREEN -->
    <section id="start-screen" class="screen active">
      <div class="container">
        <h1 class="main-title">🍦 Tiệm Kem</h1>
        <p class="subtitle">Xếp kem đúng, phục vụ khách hàng!</p>
        <div class="high-score-box">
          <span>😊 Khách vui nhất: </span><span id="high-score">0</span>/6
        </div>
        <button class="btn-primary" id="btn-start">🍨 Mở Tiệm!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <div class="game-container">
        <div class="game-header">
          <span class="customer-count">👤 Khách <span id="customer-num">1</span>/6</span>
          <span class="layer-count">🍨 Lớp <span id="layer-num">1</span>/5</span>
          <span class="happy-count">😊 <span id="happy-num">0</span></span>
        </div>

        <!-- Customer Order -->
        <div class="customer-area">
          <div class="customer-emoji" id="customer-emoji">🧑</div>
          <div class="speech-bubble" id="speech-bubble">
            <span id="order-text">Cho tôi kem...</span>
          </div>
        </div>

        <!-- Ice Cream Cone -->
        <div class="cone-area">
          <div class="cone-layers" id="cone-layers"></div>
          <div class="cone-base">🍦</div>
        </div>

        <!-- Timer -->
        <div class="timer-bar">
          <div class="timer-fill" id="timer-fill"></div>
        </div>

        <!-- Question -->
        <div class="question-box">
          <p class="q-text" id="q-text"></p>
          <div class="q-options" id="q-options"></div>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container">
        <div class="confetti" id="confetti"></div>
        <h2 class="result-title" id="result-title">🍦 Ca Làm Xong!</h2>
        <div class="result-score" id="result-score">0</div>
        <div class="result-label">khách vui</div>
        <div class="result-detail" id="result-detail"></div>
        <button class="btn-primary" id="btn-replay">🔄 Ca Mới!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>
  </div>

  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
