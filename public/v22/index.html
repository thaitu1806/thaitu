<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🏎️ Đua Xe Tri Thức - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- START SCREEN -->
    <section id="start-screen" class="screen active">
      <div class="start-container">
        <h1 class="start-title">🏎️ Đua Xe Tri Thức</h1>
        <p class="start-subtitle">Trả lời đúng để tăng tốc!</p>
        <div class="start-stats">
          <div class="stat-box">
            <span class="stat-icon">🏆</span>
            <span class="stat-value" id="stat-wins">0</span>
            <span class="stat-label">Thắng</span>
          </div>
          <div class="stat-box">
            <span class="stat-icon">🏁</span>
            <span class="stat-value" id="stat-races">0</span>
            <span class="stat-label">Cuộc đua</span>
          </div>
          <div class="stat-box">
            <span class="stat-icon">⚡</span>
            <span class="stat-value" id="stat-best">0</span>
            <span class="stat-label">Combo max</span>
          </div>
        </div>
        <div class="subject-select">
          <label class="subject-label">Chọn môn:</label>
          <div class="subject-options">
            <button class="subject-btn active" data-subject="math">🔢 Toán</button>
            <button class="subject-btn" data-subject="vietnamese">📖 Tiếng Việt</button>
            <button class="subject-btn" data-subject="english">🔤 English</button>
          </div>
        </div>
        <div class="difficulty-select">
          <label class="subject-label">Độ khó:</label>
          <div class="difficulty-options">
            <button class="diff-btn active" data-diff="easy">Dễ</button>
            <button class="diff-btn" data-diff="medium">Vừa</button>
            <button class="diff-btn" data-diff="hard">Khó</button>
          </div>
        </div>
        <button class="btn-start" id="btn-start">🏁 Bắt đầu đua!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- RACE SCREEN -->
    <section id="race-screen" class="screen">
      <div class="race-container">
        <div class="race-header">
          <span class="race-question-num" id="race-q-num">Câu 1/15</span>
          <span class="race-combo" id="race-combo"></span>
          <span class="race-timer" id="race-timer">⏱️ 10</span>
        </div>

        <!-- RACE TRACK -->
        <div class="race-track" id="race-track">
          <div class="track-finish">🏁</div>
          <div class="track-lane" data-lane="0">
            <div class="car car-player" id="car-0">
              <span class="car-emoji">🚙</span>
              <span class="car-name">Bạn</span>
            </div>
            <div class="speed-lines" id="speed-0"></div>
          </div>
          <div class="track-lane" data-lane="1">
            <div class="car car-bot1" id="car-1">
              <span class="car-emoji">🚗</span>
              <span class="car-name">Bot A</span>
            </div>
            <div class="speed-lines" id="speed-1"></div>
          </div>
          <div class="track-lane" data-lane="2">
            <div class="car car-bot2" id="car-2">
              <span class="car-emoji">🚕</span>
              <span class="car-name">Bot B</span>
            </div>
            <div class="speed-lines" id="speed-2"></div>
          </div>
          <div class="track-lane" data-lane="3">
            <div class="car car-bot3" id="car-3">
              <span class="car-emoji">🚐</span>
              <span class="car-name">Bot C</span>
            </div>
            <div class="speed-lines" id="speed-3"></div>
          </div>
        </div>

        <!-- PROGRESS BARS -->
        <div class="progress-section">
          <div class="progress-row">
            <span class="prog-label">🚙 Bạn</span>
            <div class="prog-bar"><div class="prog-fill prog-player" id="prog-0"></div></div>
            <span class="prog-dist" id="dist-0">0m</span>
          </div>
          <div class="progress-row">
            <span class="prog-label">🚗 A</span>
            <div class="prog-bar"><div class="prog-fill prog-bot1" id="prog-1"></div></div>
            <span class="prog-dist" id="dist-1">0m</span>
          </div>
          <div class="progress-row">
            <span class="prog-label">🚕 B</span>
            <div class="prog-bar"><div class="prog-fill prog-bot2" id="prog-2"></div></div>
            <span class="prog-dist" id="dist-2">0m</span>
          </div>
          <div class="progress-row">
            <span class="prog-label">🚐 C</span>
            <div class="prog-bar"><div class="prog-fill prog-bot3" id="prog-3"></div></div>
            <span class="prog-dist" id="dist-3">0m</span>
          </div>
        </div>

        <!-- QUESTION -->
        <div class="question-box" id="question-box">
          <p class="question-text" id="question-text"></p>
          <div class="answer-grid" id="answer-grid">
            <button class="ans-btn" data-opt="a"></button>
            <button class="ans-btn" data-opt="b"></button>
            <button class="ans-btn" data-opt="c"></button>
            <button class="ans-btn" data-opt="d"></button>
          </div>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container">
        <div class="result-icon" id="result-icon">🏆</div>
        <h2 class="result-title" id="result-title">Kết quả cuộc đua!</h2>
        <div class="result-standings" id="result-standings"></div>
        <div class="result-stats" id="result-stats"></div>
        <button class="btn-start" id="btn-play-again">🏁 Đua lại</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>
  </div>
  <link rel="stylesheet" href="/tts.css">
  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
