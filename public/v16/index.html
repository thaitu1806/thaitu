<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>👨‍🍳 Đầu Bếp Nhí - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- SETUP -->
    <section id="setup-screen" class="screen active">
      <div class="setup-container">
        <div class="setup-icon">👨‍🍳🍳🍜</div>
        <h1 class="setup-title">Đầu Bếp Nhí</h1>
        <p class="setup-subtitle">Nấu ăn, phục vụ khách, kiếm xu!</p>
        <div class="setup-section">
          <label class="setup-label">📚 Môn học</label>
          <div class="btn-group" id="subject-group">
            <button class="btn-option active" data-subject="math">Toán</button>
            <button class="btn-option" data-subject="vietnamese">Tiếng Việt</button>
            <button class="btn-option" data-subject="english">English</button>
            <button class="btn-option" data-subject="mix">Trộn</button>
          </div>
        </div>
        <div class="setup-section">
          <label class="setup-label">📊 Mức độ</label>
          <div class="btn-group" id="difficulty-group">
            <button class="btn-option active" data-difficulty="easy">Dễ</button>
            <button class="btn-option" data-difficulty="medium">Trung bình</button>
            <button class="btn-option" data-difficulty="hard">Khó</button>
          </div>
        </div>
        <div class="setup-section">
          <label class="setup-label">🏪 Nhà hàng</label>
          <div class="restaurant-grid" id="restaurant-grid"></div>
        </div>
        <div class="setup-stats">🍽️ Tổng khách phục vụ: <strong id="total-served">0</strong></div>
        <button class="btn-start" id="btn-start">👨‍🍳 Bắt đầu ca!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME -->
    <section id="game-screen" class="screen">
      <div class="game-bg" id="game-bg"></div>
      <div class="game-hud">
        <div class="hud-shift">🍽️ <span id="hud-served">0</span>/<span id="hud-total">8</span></div>
        <div class="hud-coins">💰 <span id="hud-coins">0</span></div>
        <div class="hud-combo" id="hud-combo"></div>
      </div>

      <!-- Customer area -->
      <div class="customer-area" id="customer-area">
        <div class="customer-emoji" id="customer-emoji">😊</div>
        <div class="customer-bubble" id="customer-bubble">Cho tôi Phở nhé!</div>
        <div class="patience-bar"><div class="patience-fill" id="patience-fill"></div></div>
      </div>

      <!-- Cooking area -->
      <div class="cooking-area">
        <div class="dish-name" id="dish-name">🍜 Phở</div>
        <div class="cooking-steps" id="cooking-steps">
          <div class="cook-step" data-step="0"><span class="step-icon">🥩</span><span class="step-label">Thái thịt</span></div>
          <div class="cook-step" data-step="1"><span class="step-icon">💧</span><span class="step-label">Nấu nước</span></div>
          <div class="cook-step" data-step="2"><span class="step-icon">🍜</span><span class="step-label">Bày tô</span></div>
        </div>
        <div class="burn-indicator" id="burn-indicator"></div>
      </div>

      <!-- Question popup -->
      <div class="question-panel" id="question-panel">
        <div class="qp-timer"><div class="qp-timer-fill" id="qp-timer-fill"></div></div>
        <div class="qp-text" id="qp-text"></div>
        <div class="qp-answers" id="qp-answers">
          <button class="qp-btn" data-opt="a"></button>
          <button class="qp-btn" data-opt="b"></button>
          <button class="qp-btn" data-opt="c"></button>
          <button class="qp-btn" data-opt="d"></button>
        </div>
        <div class="qp-status" id="qp-status"></div>
      </div>

      <!-- Serve animation overlay -->
      <div class="serve-overlay" id="serve-overlay">
        <div class="serve-content" id="serve-content"></div>
      </div>
    </section>

    <!-- RESULT -->
    <section id="result-screen" class="screen">
      <div class="result-container" id="result-container"></div>
    </section>
  </div>
  <link rel="stylesheet" href="/tts.css">
  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
