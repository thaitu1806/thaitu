<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🏎️ Đua Xe Trí Tuệ - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- SETUP SCREEN -->
    <section id="setup-screen" class="screen active">
      <div class="setup-container">
        <h1 class="setup-title">🏎️ Đua Xe Trí Tuệ</h1>
        <p class="setup-subtitle">Ai về đích trước thắng!</p>

        <!-- Player Names -->
        <div class="setup-section">
          <label class="setup-label">🎮 Người chơi</label>
          <div class="player-inputs">
            <div class="player-input-row">
              <span class="car-icon car-p1">🚗</span>
              <input type="text" id="p1-name" placeholder="Xe Đỏ" maxlength="12">
            </div>
            <div class="player-input-row">
              <span class="car-icon car-p2">🚙</span>
              <input type="text" id="p2-name" placeholder="Xe Xanh" maxlength="12">
            </div>
          </div>
        </div>

        <!-- Subject Selector -->
        <div class="setup-section">
          <label class="setup-label">📚 Môn học</label>
          <div class="btn-group" id="subject-group">
            <button class="btn-option active" data-value="math">Toán</button>
            <button class="btn-option" data-value="vietnamese">Tiếng Việt</button>
            <button class="btn-option" data-value="mix">Trộn</button>
          </div>
        </div>

        <!-- Difficulty Selector -->
        <div class="setup-section">
          <label class="setup-label">📊 Mức độ</label>
          <div class="btn-group" id="difficulty-group">
            <button class="btn-option" data-value="easy">Dễ</button>
            <button class="btn-option active" data-value="medium">Vừa</button>
            <button class="btn-option" data-value="hard">Khó</button>
          </div>
        </div>

        <!-- Track Length Selector -->
        <div class="setup-section">
          <label class="setup-label">🛣️ Chiều dài đường đua</label>
          <div class="btn-group" id="track-length-group">
            <button class="btn-option" data-value="10">Ngắn (10)</button>
            <button class="btn-option active" data-value="15">Vừa (15)</button>
            <button class="btn-option" data-value="20">Dài (20)</button>
          </div>
        </div>

        <!-- Start Button -->
        <button class="btn-start" id="btn-start">🏁 Bắt đầu đua!</button>

        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- RACE SCREEN -->
    <section id="race-screen" class="screen">
      <!-- P1 Zone (Top - rotated 180° for player sitting opposite) -->
      <div class="answer-zone zone-p1" id="zone-p1">
        <div class="zone-inner">
          <div class="zone-header">
            <span class="zone-name">🚗 <span id="az-p1-name">Xe Đỏ</span></span>
          </div>
          <div class="zone-q" id="p1-question"></div>
          <div class="zone-buttons" id="p1-buttons">
            <button class="ans-btn p1-btn" data-opt="a">A</button>
            <button class="ans-btn p1-btn" data-opt="b">B</button>
            <button class="ans-btn p1-btn" data-opt="c">C</button>
            <button class="ans-btn p1-btn" data-opt="d">D</button>
          </div>
          <div class="zone-status" id="p1-status"></div>
        </div>
      </div>

      <!-- Exit + Round info bar (separate from track) -->
      <div class="race-info-bar">
        <button class="btn-exit-race" id="btn-exit-race" title="Thoát">✕</button>
        <span class="round-counter" id="round-counter">Vòng 1</span>
      </div>

      <!-- Middle Area: Track + Timer -->
      <div class="race-middle">
        <div class="track-area">
          <div class="track-wrapper">
            <div class="race-track" id="race-track">
              <div class="lane lane-p1" id="lane-p1">
                <div class="car car-p1" id="car-p1">🚗</div>
              </div>
              <div class="lane lane-p2" id="lane-p2">
                <div class="car car-p2" id="car-p2">🚙</div>
              </div>
            </div>
          </div>
        </div>
        <div class="timer-bar-container">
          <div class="timer-bar" id="timer-bar"></div>
        </div>
      </div>

      <!-- Exit confirm popup -->
      <div class="exit-confirm-overlay" id="exit-confirm-overlay">
        <div class="exit-confirm-card">
          <div class="exit-confirm-icon">🚪</div>
          <div class="exit-confirm-text">Bạn muốn thoát trò chơi?</div>
          <div class="exit-confirm-buttons">
            <button class="exit-confirm-btn cancel" id="exit-cancel">Tiếp tục</button>
            <button class="exit-confirm-btn confirm" id="exit-confirm">Thoát</button>
          </div>
        </div>
      </div>

      <!-- P2 Zone (Bottom - normal orientation) -->
      <div class="answer-zone zone-p2" id="zone-p2">
        <div class="zone-inner">
          <div class="zone-header">
            <span class="zone-name">🚙 <span id="az-p2-name">Xe Xanh</span></span>
          </div>
          <div class="zone-q" id="p2-question"></div>
          <div class="zone-buttons" id="p2-buttons">
            <button class="ans-btn p2-btn" data-opt="a">A</button>
            <button class="ans-btn p2-btn" data-opt="b">B</button>
            <button class="ans-btn p2-btn" data-opt="c">C</button>
            <button class="ans-btn p2-btn" data-opt="d">D</button>
          </div>
          <div class="zone-status" id="p2-status"></div>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container">
        <div class="result-celebration" id="result-celebration"></div>
        <div class="result-trophy">🏆</div>
        <h2 class="result-title" id="result-title">Người chiến thắng!</h2>
        <p class="result-winner" id="result-winner"></p>

        <div class="stats-table">
          <table>
            <thead>
              <tr>
                <th></th>
                <th id="stats-p1-name">🚗 Xe Đỏ</th>
                <th id="stats-p2-name">🚙 Xe Xanh</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Số vòng</td>
                <td id="stats-rounds" colspan="2">-</td>
              </tr>
              <tr>
                <td>Trả lời đúng</td>
                <td id="stats-p1-correct">-</td>
                <td id="stats-p2-correct">-</td>
              </tr>
              <tr>
                <td>Thời gian TB</td>
                <td id="stats-p1-time">-</td>
                <td id="stats-p2-time">-</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="result-buttons">
          <button class="btn-play-again" id="btn-play-again">🔄 Chơi lại</button>
          <a href="/" class="btn-home">🏠 Về trang chủ</a>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
