<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🦷 Bác Sĩ Răng - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/tts.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- START SCREEN -->
    <section id="start-screen" class="screen active">
      <div class="container">
        <h1 class="main-title">🦷 Bác Sĩ Răng</h1>
        <p class="subtitle">Chữa răng, thu nụ cười!</p>
        <div class="smile-box">
          <span>😁 Kỷ lục: </span><span id="high-smiles">0</span> nụ cười
        </div>
        <button class="btn-primary" id="btn-start">🏥 Bắt Đầu Ca Trực!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <div class="game-container">
        <div class="game-header">
          <span class="patient-count">🧑 BN <span id="patient-num">1</span>/6</span>
          <span class="smiles-count">😁 <span id="smiles">0</span></span>
          <span class="retries-left">❤️ <span id="retries">2</span></span>
        </div>

        <!-- Mouth/Teeth Visual -->
        <div class="mouth-area" id="mouth-area">
          <div class="mouth-emoji" id="mouth-emoji">😬</div>
          <div class="teeth-row" id="teeth-row">
            <span class="tooth dirty">🦷</span>
            <span class="tooth dirty">🦷</span>
            <span class="tooth dirty">🦷</span>
            <span class="tooth dirty">🦷</span>
          </div>
          <div class="patient-status" id="patient-status">Bệnh nhân đang chờ...</div>
        </div>

        <!-- Step Progress -->
        <div class="step-progress" id="step-progress">
          <div class="step-dot active" data-step="0"><span>🔍</span><small>Khám</small></div>
          <div class="step-dot" data-step="1"><span>🧹</span><small>Cạo</small></div>
          <div class="step-dot" data-step="2"><span>🔧</span><small>Trám</small></div>
          <div class="step-dot" data-step="3"><span>✨</span><small>Đánh bóng</small></div>
        </div>

        <!-- Timer -->
        <div class="timer-bar">
          <div class="timer-fill" id="timer-fill"></div>
        </div>

        <!-- Question Area -->
        <div class="question-box" id="question-box">
          <p class="q-text" id="q-text"></p>
          <div class="q-options" id="q-options"></div>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container">
        <div class="confetti" id="confetti"></div>
        <h2 class="result-title" id="result-title">🦷 Ca Trực Kết Thúc!</h2>
        <div class="result-score" id="result-score">0</div>
        <div class="result-label">nụ cười</div>
        <div class="smile-collection" id="smile-collection"></div>
        <div class="result-detail" id="result-detail"></div>
        <button class="btn-primary" id="btn-replay">🔄 Ca Trực Mới!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>
  </div>

  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
