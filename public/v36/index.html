<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🤿 Thợ Lặn Kho Báu - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="/tts.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- START SCREEN -->
    <section id="start-screen" class="screen active">
      <div class="container">
        <h1 class="main-title">🤿 Thợ Lặn Kho Báu</h1>
        <p class="subtitle">Lật ô tìm kho báu dưới đáy biển!</p>
        <div class="high-score-box">
          <span>💰 Kỷ lục: </span><span id="high-score">0</span> xu
        </div>
        <button class="btn-primary" id="btn-start">🌊 Lặn Xuống!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <div class="game-container">
        <div class="game-header">
          <span class="lives">❤️ <span id="lives">3</span></span>
          <span class="coins">💰 <span id="coins">0</span></span>
          <span class="map-progress">🗺️ <span id="map-count">0</span>/4</span>
        </div>

        <!-- Treasure Chest -->
        <div class="treasure-chest" id="treasure-chest">
          <div class="chest-icon">🧳</div>
          <div class="chest-label">Tìm 4 mảnh bản đồ!</div>
        </div>

        <!-- 5x5 Grid -->
        <div class="dive-grid" id="dive-grid"></div>

        <!-- Timer -->
        <div class="timer-bar">
          <div class="timer-fill" id="timer-fill"></div>
        </div>

        <!-- Question Area (hidden until tile clicked) -->
        <div class="question-box" id="question-box" style="display:none;">
          <p class="q-text" id="q-text"></p>
          <div class="q-options" id="q-options"></div>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container">
        <div class="confetti" id="confetti"></div>
        <h2 class="result-title" id="result-title">🤿 Kết Quả!</h2>
        <div class="result-score" id="result-score">0</div>
        <div class="result-label">xu</div>
        <div class="result-detail" id="result-detail"></div>
        <button class="btn-primary" id="btn-replay">🔄 Lặn Lại!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>
  </div>

  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
