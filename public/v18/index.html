<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>⚔️ Ninja Toán Học - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- SETUP SCREEN -->
    <section id="setup-screen" class="screen active">
      <div class="setup-container">
        <div class="setup-icon">⚔️🥋🔥</div>
        <h1 class="setup-title">Ninja Toán Học</h1>
        <p class="setup-subtitle">Chém câu hỏi, luyện võ trí tuệ!</p>
        <div class="setup-section">
          <label class="setup-label">📚 Môn học</label>
          <div class="btn-group" id="subject-group">
            <button class="btn-option active" data-subject="math">Toán</button>
            <button class="btn-option" data-subject="vietnamese">Tiếng Việt</button>
            <button class="btn-option" data-subject="english">English</button>
            <button class="btn-option" data-subject="mix">Trộn</button>
          </div>
        </div>
        <div class="setup-section">
          <label class="setup-label">📊 Mức độ</label>
          <div class="btn-group" id="difficulty-group">
            <button class="btn-option active" data-difficulty="easy">Dễ</button>
            <button class="btn-option" data-difficulty="medium">Trung bình</button>
            <button class="btn-option" data-difficulty="hard">Khó</button>
          </div>
        </div>
        <div class="setup-belt">🥋 Đai hiện tại: <strong id="current-belt">Trắng</strong></div>
        <div class="setup-waves">🌊 Tổng sóng đã vượt: <strong id="total-waves">0</strong></div>
        <button class="btn-start" id="btn-start">⚔️ Xuất chiêu!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <div class="dojo-bg" id="dojo-bg">
        <div class="dojo-floor"></div>
        <div class="dojo-pillars">
          <div class="pillar left"></div>
          <div class="pillar right"></div>
        </div>
      </div>

      <!-- HUD -->
      <div class="game-hud">
        <div class="hud-left">
          <span class="hud-lives" id="hud-lives">❤️❤️❤️</span>
          <span class="hud-belt" id="hud-belt">🥋</span>
        </div>
        <div class="hud-center">
          <span class="hud-wave" id="hud-wave">Sóng 1</span>
        </div>
        <div class="hud-right">
          <span class="hud-score" id="hud-score">⭐ 0</span>
          <span class="hud-combo" id="hud-combo"></span>
        </div>
      </div>

      <!-- Timer bar -->
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill"></div>
      </div>

      <!-- Scroll (question) area -->
      <div class="scroll-area" id="scroll-area">
        <div class="scroll-container" id="scroll-container">
          <div class="scroll-roll">📜</div>
          <div class="scroll-text" id="scroll-text"></div>
        </div>
      </div>

      <!-- Ninja player -->
      <div class="ninja-player" id="ninja-player">⚔️</div>

      <!-- Answer buttons -->
      <div class="answer-area" id="answer-area">
        <button class="ans-btn" data-opt="a"></button>
        <button class="ans-btn" data-opt="b"></button>
        <button class="ans-btn" data-opt="c"></button>
        <button class="ans-btn" data-opt="d"></button>
      </div>

      <!-- Slash effect overlay -->
      <div class="slash-effect" id="slash-effect"></div>
      <!-- Wrong flash overlay -->
      <div class="wrong-flash" id="wrong-flash"></div>
      <!-- Boss indicator -->
      <div class="boss-indicator" id="boss-indicator">
        <div class="boss-text">👹 BOSS! Trả lời đúng 3 câu liên tiếp!</div>
        <div class="boss-progress" id="boss-progress"></div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container" id="result-container"></div>
    </section>
  </div>
  <link rel="stylesheet" href="/tts.css">
  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
