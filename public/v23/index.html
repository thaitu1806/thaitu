<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>🏥 Bệnh Viện Thú Cưng - Học Vui</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- START SCREEN -->
    <section id="start-screen" class="screen active">
      <div class="start-container">
        <h1 class="start-title">🏥 Bệnh Viện Thú Cưng</h1>
        <p class="start-subtitle">Chữa bệnh cho thú cưng bằng trí tuệ!</p>
        <div class="start-stats">
          <div class="stat-box">
            <span class="stat-icon">❤️</span>
            <span class="stat-value" id="stat-healed">0</span>
            <span class="stat-label">Đã chữa</span>
          </div>
          <div class="stat-box">
            <span class="stat-icon">🏥</span>
            <span class="stat-value" id="stat-shifts">0</span>
            <span class="stat-label">Ca trực</span>
          </div>
          <div class="stat-box">
            <span class="stat-icon">⭐</span>
            <span class="stat-value" id="stat-best">0</span>
            <span class="stat-label">Tốt nhất</span>
          </div>
        </div>
        <div class="subject-select">
          <label class="subject-label">Chọn môn:</label>
          <div class="subject-options">
            <button class="subject-btn active" data-subject="math">🔢 Toán</button>
            <button class="subject-btn" data-subject="vietnamese">📖 Tiếng Việt</button>
            <button class="subject-btn" data-subject="english">🔤 English</button>
          </div>
        </div>
        <div class="difficulty-select">
          <label class="subject-label">Độ khó:</label>
          <div class="difficulty-options">
            <button class="diff-btn active" data-diff="easy">Dễ</button>
            <button class="diff-btn" data-diff="medium">Vừa</button>
            <button class="diff-btn" data-diff="hard">Khó</button>
          </div>
        </div>
        <button class="btn-start" id="btn-start">🩺 Bắt đầu ca trực!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <div class="game-container">
        <div class="game-header">
          <span class="game-patient-num" id="game-patient-num">Bệnh nhân 1/8</span>
          <span class="game-retries" id="game-retries">❤️❤️</span>
          <span class="game-timer" id="game-timer">⏱️ 10</span>
        </div>

        <!-- PET DISPLAY -->
        <div class="pet-area">
          <div class="pet-emoji" id="pet-emoji">🐶</div>
          <div class="pet-illness" id="pet-illness">Bệnh: Sốt</div>
          <div class="pet-mood" id="pet-mood"></div>
        </div>

        <!-- STEP PROGRESS -->
        <div class="step-progress" id="step-progress">
          <div class="step-dot active" data-step="0">
            <span class="step-icon">🩺</span>
            <span class="step-name">Khám</span>
          </div>
          <div class="step-connector"></div>
          <div class="step-dot" data-step="1">
            <span class="step-icon">💊</span>
            <span class="step-name">Chẩn đoán</span>
          </div>
          <div class="step-connector"></div>
          <div class="step-dot" data-step="2">
            <span class="step-icon">💉</span>
            <span class="step-name">Điều trị</span>
          </div>
          <div class="step-connector"></div>
          <div class="step-dot" data-step="3">
            <span class="step-icon">❤️</span>
            <span class="step-name">Hồi phục</span>
          </div>
        </div>

        <!-- QUESTION -->
        <div class="question-box" id="question-box">
          <p class="question-label" id="question-label">🩺 Bước khám bệnh:</p>
          <p class="question-text" id="question-text"></p>
          <div class="answer-grid" id="answer-grid">
            <button class="ans-btn" data-opt="a"></button>
            <button class="ans-btn" data-opt="b"></button>
            <button class="ans-btn" data-opt="c"></button>
            <button class="ans-btn" data-opt="d"></button>
          </div>
        </div>

        <!-- HEALED COUNT -->
        <div class="healed-bar">
          <span id="healed-count">❤️ Đã chữa: 0</span>
        </div>
      </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="result-screen" class="screen">
      <div class="result-container">
        <div class="result-icon" id="result-icon">🏥</div>
        <h2 class="result-title" id="result-title">Kết thúc ca trực!</h2>
        <div class="result-pets" id="result-pets"></div>
        <div class="result-stats" id="result-stats"></div>
        <button class="btn-start" id="btn-play-again">🩺 Ca trực mới!</button>
        <a href="/" class="home-link">🏠 Về trang chủ</a>
      </div>
    </section>
  </div>
  <link rel="stylesheet" href="/tts.css">
  <script src="/tts.js"></script>
  <script src="/link-gate.js"></script>
  <script src="game.js"></script>
  <script src="/quest-widget.js"></script>
  <script src="/diamond-animation.js"></script>
  <script src="/help-rules.js"></script>
</body>
</html>
